name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, build UI, test Rust
        run: pnpm nx run ui:build && pnpm nx run desktop:test

  bdd:
    runs-on: macos-latest
    needs: build
    strategy:
      matrix:
        tags: ["@mock-langdock", "@prompt-library", "@agents"]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run BDD (${{ matrix.tags }})
        run: pnpm nx run bdd:test
        env:
          BDD_TAGS: ${{ matrix.tags }}
